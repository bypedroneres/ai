<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLLPR</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111'/><text x='16' y='21' text-anchor='middle' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='13' font-weight='600' fill='white'>WPR</text></svg>">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">WPR</span>
    <h1>WLLPR</h1>
  </div>
  <p>Gere o seu papel de parede minimalista</p>
  <button class="site-theme-btn" id="siteThemeBtn" title="Alternar tema do site">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"
            stroke="currentColor"
            stroke-width="1.3"
            stroke-linecap="round"/>
    </svg>
  </button>
</header>

<div class="main-layout">
  <div class="preview-area">
    <div class="preview-container">
      <div class="preview-desktop-wrap">
        <div class="preview-label">Desktop 4K</div>
        <canvas id="previewDesktop" width="960" height="540"></canvas>
      </div>

      <div class="preview-mobile-wrap">
        <div class="preview-label">iPhone</div>
        <canvas id="previewMobile" width="290" height="628"></canvas>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="control-label">Padrão</div>
      <div class="style-grid" id="styleGrid"></div>
    </div>

    <div class="control-group">
      <div class="control-label">Paleta</div>
      <div class="palette-row" id="paletteRow"></div>
    </div>

    <div class="control-group">
      <div class="control-label">Modo</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btnDark">
          <span class="mode-icon mode-icon-dark"></span>
          Escuro
        </button>

        <button class="mode-btn" id="btnLight">
          <span class="mode-icon mode-icon-light"></span>
          Claro
        </button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">Variação</div>
      <div class="seed-row">
        <button class="btn-shuffle" id="btnShuffle" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          <span>GERAR UM NOVO</span>
        </button>
      </div>
    </div>

    <div class="control-group export-group">
      <button class="btn-export btn-desktop" id="btnDesktop">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v8M5 7l3 3 3-3M3 12h10"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"/>
        </svg>
        Baixar Desktop
      </button>

      <div class="size-hint">3840 × 2160 px</div>

      <button class="btn-export btn-mobile" id="btnMobile">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v8M5 7l3 3 3-3M3 12h10"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"/>
        </svg>
        Baixar iPhone
      </button>

      <div class="size-hint">1290 × 2796 px</div>
    </div>
  </div>
</div>

<footer class="site-footer">
  Criado por
  <a href="https://www.instagram.com/pedro___neres/" target="_blank" rel="noopener">
    @pedro___neres
  </a>
</footer>

<div class="modal-overlay" id="modal">
  <button class="modal-close" id="modalClose">&times;</button>

  <img id="modalImg" src="" alt="Wallpaper">

  <div class="modal-hint">
    Clique com o botão direito e escolha "Salvar imagem como"
  </div>

  <div class="modal-info" id="modalInfo"></div>
</div>

<script src="script.js"></script>

</body>
</html>
