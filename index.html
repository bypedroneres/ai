<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Wallpaper Generator</title>
<style>
  :root {
    --bg: #f5f2ed;
    --text: #1a1a1a;
    --text-muted: #8a857d;
    --border: #d9d4cc;
    --accent: #1a1a1a;
    --card-bg: #ffffff;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  header p {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .main-layout {
    display: flex;
    gap: 48px;
    max-width: 1200px;
    width: 100%;
    align-items: flex-start;
  }

  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .preview-container {
    position: relative;
    background: var(--card-bg);
    border-radius: 8px;
    box-shadow: var(--card-shadow);
    padding: 16px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: center;
  }

  .preview-desktop-wrap {
    flex: 1;
    max-width: 560px;
  }

  .preview-mobile-wrap {
    width: 120px;
    flex-shrink: 0;
  }

  .preview-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-align: center;
  }

  .preview-desktop-wrap canvas,
  .preview-mobile-wrap canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }

  .controls {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
  }

  .style-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .style-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    padding: 6px;
  }

  .style-btn:hover { border-color: var(--text-muted); }
  .style-btn.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .style-btn canvas {
    width: 100%;
    height: 100%;
    border-radius: 3px;
  }

  .palette-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .palette-swatch {
    width: 40px;
    height: 28px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    display: flex;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .palette-swatch:hover { border-color: var(--text-muted); }
  .palette-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .palette-swatch span {
    flex: 1;
  }

  .seed-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-shuffle {
    flex: 1;
    padding: 10px 16px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    color: var(--text);
  }

  .btn-shuffle:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  .export-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-export {
    padding: 14px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-export:active { transform: scale(0.98); }

  .btn-desktop {
    background: var(--accent);
    color: #fff;
  }

  .btn-mobile {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
  }

  .btn-export:hover { opacity: 0.85; }

  .size-hint {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  @media (max-width: 800px) {
    .main-layout {
      flex-direction: column;
      align-items: center;
    }
    .controls { width: 100%; max-width: 400px; }
    .preview-area { width: 100%; }
  }

  @media print {
    body { padding: 20px; }
    .controls { display: none; }
    .preview-container { box-shadow: none; border: 1px solid #ddd; }
  }
</style>
</head>
<body>

<header>
  <h1>Wallpaper Studio</h1>
  <p>Generative minimalist backgrounds</p>
</header>

<div class="main-layout">
  <div class="preview-area">
    <div class="preview-container">
      <div class="preview-desktop-wrap">
        <div class="preview-label">Desktop 4K</div>
        <canvas id="previewDesktop" width="960" height="540"></canvas>
      </div>
      <div class="preview-mobile-wrap">
        <div class="preview-label">iPhone</div>
        <canvas id="previewMobile" width="290" height="628"></canvas>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="control-label">Pattern</div>
      <div class="style-grid" id="styleGrid"></div>
    </div>

    <div class="control-group">
      <div class="control-label">Palette</div>
      <div class="palette-row" id="paletteRow"></div>
    </div>

    <div class="control-group">
      <div class="control-label">Variation</div>
      <div class="seed-row">
        <button class="btn-shuffle" id="btnShuffle">Randomize</button>
      </div>
    </div>

    <div class="control-group export-group">
      <button class="btn-export btn-desktop" id="btnDesktop">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 11l6 4 6-4M2 8l6 4 6-4M2 5l6 4 6-4L8 1 2 5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Download Desktop
      </button>
      <div class="size-hint">3840 x 2160 px</div>
      <button class="btn-export btn-mobile" id="btnMobile">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="4" y="1" width="8" height="14" rx="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="7" y1="12.5" x2="9" y2="12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Download iPhone
      </button>
      <div class="size-hint">1290 x 2796 px</div>
    </div>
  </div>
</div>

<script>
const DESKTOP_W = 3840, DESKTOP_H = 2160;
const MOBILE_W = 1290, MOBILE_H = 2796;

const PALETTES = [
  { name: 'Charcoal',   colors: ['#0d0d0d','#1a1a1a','#2a2a2a','#3d3d3d','#555555','#707070','#8a8a8a','#a3a3a3','#bdbdbd'] },
  { name: 'Stone',      colors: ['#2c2825','#3e3a35','#534e47','#6b655c','#857d72','#9f9688','#b8b0a3','#d1c9bd','#e8e2d8'] },
  { name: 'Ocean',      colors: ['#0a1628','#12243d','#1a3352','#234568','#2d587f','#3a6d96','#4d84ad','#6a9cc0','#8fb5d4'] },
  { name: 'Dusk',       colors: ['#1a1020','#2a1832','#3d2248','#52305e','#6a4075','#82528d','#9a68a5','#b280bd','#ca9ad5'] },
  { name: 'Rust',       colors: ['#1f1410','#33201a','#4a2e24','#633e30','#7d5040','#976352','#b07868','#c89080','#dea99a'] },
  { name: 'Forest',     colors: ['#0c1a10','#162a1c','#213d2a','#2e523a','#3c684c','#4d7f60','#619776','#78af8e','#92c7a8'] },
];

const PATTERNS = [
  'flowing-hills',
  'crashing-wave',
  'sand-dunes',
  'soft-mountains',
  'concentric-arcs',
  'terrain-lines',
];

const PATTERN_LABELS = [
  'Hills', 'Wave', 'Dunes', 'Peaks', 'Arcs', 'Terrain'
];

let currentPattern = 0;
let currentPalette = 0;
let seed = Math.random() * 10000 | 0;

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function noise(x, rng) {
  const ix = Math.floor(x);
  const fx = x - ix;
  const t = fx * fx * (3 - 2 * fx);
  const seedA = Math.sin(ix * 127.1 + seed * 0.01) * 43758.5453;
  const seedB = Math.sin((ix + 1) * 127.1 + seed * 0.01) * 43758.5453;
  const a = seedA - Math.floor(seedA);
  const b = seedB - Math.floor(seedB);
  return a + (b - a) * t;
}

function fbm(x, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * noise(x * freq);
    amp *= 0.5;
    freq *= 2.1;
  }
  return val;
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function getColor(palette, t) {
  const colors = PALETTES[palette].colors;
  const idx = t * (colors.length - 1);
  const i = Math.floor(idx);
  const f = idx - i;
  if (i >= colors.length - 1) return colors[colors.length - 1];
  return lerpColor(colors[i], colors[i+1], f);
}

function drawPattern(ctx, w, h, pattern, palette, s) {
  seed = s;
  const rng = mulberry32(s);
  ctx.fillStyle = PALETTES[palette].colors[0];
  ctx.fillRect(0, 0, w, h);

  switch(PATTERNS[pattern]) {
    case 'flowing-hills': drawFlowingHills(ctx, w, h, palette, rng); break;
    case 'crashing-wave': drawCrashingWave(ctx, w, h, palette, rng); break;
    case 'sand-dunes':    drawSandDunes(ctx, w, h, palette, rng); break;
    case 'soft-mountains':drawSoftMountains(ctx, w, h, palette, rng); break;
    case 'concentric-arcs':drawConcentricArcs(ctx, w, h, palette, rng); break;
    case 'terrain-lines': drawTerrainLines(ctx, w, h, palette, rng); break;
  }
}

function drawFlowingHills(ctx, w, h, pal, rng) {
  const layers = 6 + (rng() * 4 | 0);
  for (let i = 0; i < layers; i++) {
    const t = (i + 1) / layers;
    const baseY = h * (0.3 + t * 0.55);
    ctx.beginPath();
    ctx.moveTo(0, h);
    for (let x = 0; x <= w; x += 2) {
      const nx = x / w;
      const y = baseY + fbm(nx * 3 + i * 1.7 + rng() * 0.5, 5) * h * 0.2 - h * 0.1;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, t * 0.85 + 0.1);
    ctx.fill();
  }
}

function drawCrashingWave(ctx, w, h, pal, rng) {
  const layers = 8 + (rng() * 5 | 0);
  const centerX = w * (0.45 + rng() * 0.1);
  const baseY = h * (0.55 + rng() * 0.1);
  for (let i = layers; i >= 0; i--) {
    const t = i / layers;
    const spread = w * (0.15 + t * 0.45);
    const peakH = h * (0.08 + t * 0.35);
    const skew = rng() * 0.3 - 0.15;
    ctx.beginPath();
    ctx.moveTo(0, h);
    ctx.lineTo(0, baseY + peakH * 0.5);
    const steps = 120;
    for (let s = 0; s <= steps; s++) {
      const st = s / steps;
      const x = st * w;
      const dist = (x - centerX) / spread;
      const bell = Math.exp(-dist * dist * 2);
      const asymmetry = 1 + skew * dist;
      const wave = bell * peakH * asymmetry;
      const micro = fbm(st * 5 + i * 1.4, 3) * h * 0.008;
      const y = baseY - wave + micro;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8);
    ctx.fill();
  }
}

function drawSandDunes(ctx, w, h, pal, rng) {
  const layers = 7 + (rng() * 5 | 0);
  for (let i = 0; i < layers; i++) {
    const t = (i + 1) / layers;
    const baseY = h * (0.25 + t * 0.6);
    const freq = 1.5 + rng() * 2.5;
    const phase = rng() * 10;
    ctx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      const nx = x / w;
      const wave = Math.sin(nx * Math.PI * freq + phase) * h * 0.06;
      const n = fbm(nx * 2.5 + i * 2.1, 3) * h * 0.08;
      const y = baseY + wave + n;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, t * 0.8 + 0.15);
    ctx.fill();
  }
}

function drawSoftMountains(ctx, w, h, pal, rng) {
  const count = 8 + (rng() * 8 | 0);
  const peaks = [];
  for (let i = 0; i < count; i++) {
    peaks.push({
      x: rng() * w,
      width: w * (0.08 + rng() * 0.15),
      height: h * (0.3 + rng() * 0.55),
      color: rng(),
    });
  }
  peaks.sort((a, b) => a.height - b.height);

  for (const p of peaks) {
    const topY = h - p.height;
    ctx.beginPath();
    ctx.moveTo(p.x - p.width, h);
    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = p.x - p.width + t * p.width * 2;
      const base = topY + (1 - Math.pow(1 - Math.abs(t - 0.5) * 2, 2.5)) * p.height;
      const n = fbm(t * 4 + p.color * 10, 3) * h * 0.02;
      ctx.lineTo(x, base + n);
    }
    ctx.lineTo(p.x + p.width, h);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, 0.2 + p.color * 0.65);
    ctx.fill();
  }
}

function drawConcentricArcs(ctx, w, h, pal, rng) {
  const originX = w * (0.6 + rng() * 0.4);
  const originY = h * (0.7 + rng() * 0.4);
  const rings = 12 + (rng() * 8 | 0);
  const maxR = Math.max(w, h) * 1.2;

  for (let i = rings; i >= 0; i--) {
    const t = i / rings;
    const r = maxR * t;
    const thickness = maxR / rings * 1.05;
    ctx.beginPath();
    ctx.arc(originX, originY, r, 0, Math.PI * 2);
    ctx.arc(originX, originY, Math.max(0, r - thickness), 0, Math.PI * 2, true);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8);
    ctx.fill();
  }
}

function drawTerrainLines(ctx, w, h, pal, rng) {
  const lines = 40 + (rng() * 30 | 0);
  const baseOffset = rng() * 100;
  ctx.lineWidth = Math.max(1, h / 400);
  ctx.lineCap = 'round';

  for (let i = 0; i < lines; i++) {
    const t = i / lines;
    const baseY = h * (0.1 + t * 0.8);
    ctx.beginPath();
    for (let x = 0; x <= w; x += 3) {
      const nx = x / w;
      const elevation = fbm(nx * 3 + i * 0.8 + baseOffset, 5) * h * 0.08;
      const y = baseY + elevation;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = getColor(pal, 0.3 + t * 0.6);
    ctx.stroke();
  }
}

function drawMiniPattern(ctx, w, h, patternIdx) {
  seed = 42;
  ctx.fillStyle = PALETTES[0].colors[0];
  ctx.fillRect(0, 0, w, h);
  drawPattern(ctx, w, h, patternIdx, 0, 42);
}

function buildStyleGrid() {
  const grid = document.getElementById('styleGrid');
  PATTERNS.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'style-btn' + (i === currentPattern ? ' active' : '');
    btn.title = PATTERN_LABELS[i];
    const c = document.createElement('canvas');
    c.width = 80; c.height = 80;
    btn.appendChild(c);
    grid.appendChild(btn);
    drawMiniPattern(c.getContext('2d'), 80, 80, i);
    btn.onclick = () => {
      currentPattern = i;
      grid.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
  });
}

function buildPaletteRow() {
  const row = document.getElementById('paletteRow');
  PALETTES.forEach((pal, i) => {
    const swatch = document.createElement('button');
    swatch.className = 'palette-swatch' + (i === currentPalette ? ' active' : '');
    swatch.title = pal.name;
    const show = [pal.colors[0], pal.colors[Math.floor(pal.colors.length/2)], pal.colors[pal.colors.length-1]];
    show.forEach(c => {
      const s = document.createElement('span');
      s.style.background = c;
      swatch.appendChild(s);
    });
    row.appendChild(swatch);
    swatch.onclick = () => {
      currentPalette = i;
      row.querySelectorAll('.palette-swatch').forEach(b => b.classList.remove('active'));
      swatch.classList.add('active');
      render();
    };
  });
}

function render() {
  const dCtx = document.getElementById('previewDesktop').getContext('2d');
  const mCtx = document.getElementById('previewMobile').getContext('2d');
  drawPattern(dCtx, 960, 540, currentPattern, currentPalette, seed);
  drawPattern(mCtx, 290, 628, currentPattern, currentPalette, seed);
}

function exportImage(w, h, filename) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  drawPattern(c.getContext('2d'), w, h, currentPattern, currentPalette, seed);
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

document.getElementById('btnShuffle').onclick = () => {
  seed = Math.random() * 100000 | 0;
  render();
};

document.getElementById('btnDesktop').onclick = () => {
  exportImage(DESKTOP_W, DESKTOP_H, 'wallpaper-desktop-4k.png');
};

document.getElementById('btnMobile').onclick = () => {
  exportImage(MOBILE_W, MOBILE_H, 'wallpaper-iphone.png');
};

buildStyleGrid();
buildPaletteRow();
render();
</script>
</body>
</html>
